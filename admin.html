<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div id="main" style="display:none;" class="p-4 max-w-md mx-auto">

  <h1 class="text-2xl mb-4 text-center">Admin Panel</h1>

  <!-- Upload Section -->
  <div class="bg-gray-800 p-4 rounded mb-4">
    <h2 class="mb-2">Upload Reel</h2>

    <input type="file" id="file" class="mb-2 w-full">
    <input id="title" placeholder="Title" class="w-full p-2 mb-2 text-black">
    <input id="category" placeholder="Category" class="w-full p-2 mb-2 text-black">

    <button onclick="upload()" class="bg-green-500 w-full p-2 rounded">Upload</button>
  </div>

  <!-- List Section -->
  <div class="bg-gray-800 p-4 rounded">
    <h2 class="mb-2">All Reels</h2>
    <div id="list"></div>
  </div>

</div>

<script type="module">

// 🔐 Password Protection
const pass = prompt("Enter Admin Password");
if(pass !== "1997"){
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50%'>Access Denied</h1>";
  throw new Error("Access Denied");
}
document.getElementById("main").style.display = "block";

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
  storageBucket: "reels-f0d24.appspot.com",
  messagingSenderId: "658150381663",
  appId: "1:658150381663:web:21f4e37a3163ea0f8f23ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🚀 Upload Function (Error handled)
window.upload = async function(){

  try {
    const file = document.getElementById("file").files[0];
    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;

    if(!file || !title || !category){
      alert("Please fill all fields");
      return;
    }

    // Upload image
    const storageRef = ref(storage, "reels/" + Date.now() + file.name);
    await uploadBytes(storageRef, file);

    // Get URL
    const url = await getDownloadURL(storageRef);

    // Save to Firestore
    await addDoc(collection(db, "reels"), {
      image: url,
      title: title,
      category: category
    });

    alert("Uploaded Successfully ✅");

    // Clear inputs
    document.getElementById("file").value = "";
    document.getElementById("title").value = "";
    document.getElementById("category").value = "";

  } catch(error){
    console.error(error);
    alert("Error: " + error.message);
  }

};

// 🔥 Load Reels
const listDiv = document.getElementById("list");

onSnapshot(collection(db, "reels"), (snapshot) => {

  listDiv.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const title = data.title || "No Title";

    const div = document.createElement("div");
    div.className = "bg-gray-700 p-2 mb-3 rounded";

    div.innerHTML = `
      <img src="${data.image}" style="width:100%;height:150px;object-fit:cover;border-radius:5px;" />
      <p class="mt-1">${title}</p>
      <button onclick="deleteReel('${docItem.id}')" class="bg-red-500 px-3 py-1 mt-1 rounded">Delete</button>
    `;

    listDiv.appendChild(div);
  });

});

// ❌ Delete Function
window.deleteReel = async function(id){
  if(confirm("Delete this reel?")){
    await deleteDoc(doc(db, "reels", id));
    alert("Deleted ❌");
  }
};

</script>

</body>
</html>
