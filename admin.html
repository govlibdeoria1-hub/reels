<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div id="main" style="display:none;" class="p-4">

  <h1 class="text-2xl mb-4">Admin Panel</h1>

  <!-- Upload Section -->
  <div class="bg-gray-800 p-4 rounded mb-4">
    <h2 class="mb-2">Upload Reel</h2>

    <input type="file" id="file" class="mb-2">
    <input id="title" placeholder="Title" class="w-full p-2 mb-2 text-black">
    <input id="category" placeholder="Category" class="w-full p-2 mb-2 text-black">

    <button onclick="upload()" class="bg-green-500 px-4 py-2 rounded">Upload</button>
  </div>

  <!-- List Section -->
  <div class="bg-gray-800 p-4 rounded">
    <h2 class="mb-2">All Reels</h2>
    <div id="list"></div>
  </div>

</div>

<script type="module">

// 🔐 Password Protection
const pass = prompt("Enter Admin Password");
if(pass !== "1997"){
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50%'>Access Denied</h1>";
  throw new Error("Access Denied");
}
document.getElementById("main").style.display = "block";

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
  storageBucket: "reels-f0d24.appspot.com",
  messagingSenderId: "658150381663",
  appId: "1:658150381663:web:21f4e37a3163ea0f8f23ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔥 Upload Function
window.upload = async function(){

  const file = document.getElementById("file").files[0];
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;

  if(!file || !title || !category){
    alert("Fill all fields");
    return;
  }

  const storageRef = ref(storage, "reels/" + Date.now() + file.name);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "reels"), {
    image: url,
    title: title,
    category: category
  });

  alert("Uploaded ✅");

};

// 🔥 Load + Delete
const listDiv = document.getElementById("list");

onSnapshot(collection(db, "reels"), (snapshot) => {

  listDiv.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const div = document.createElement("div");
    div.className = "bg-gray-700 p-2 mb-2 rounded";

    div.innerHTML = `
      <img src="${data.image}" style="width:100%;height:120px;object-fit:cover;" />
      <p>${data.title}</p>
      <button onclick="deleteReel('${docItem.id}')" class="bg-red-500 px-2 py-1 mt-1">Delete</button>
    `;

    listDiv.appendChild(div);
  });

});

// 🔥 Delete
window.deleteReel = async function(id){
  await deleteDoc(doc(db, "reels", id));
  alert("Deleted ❌");
};

</script>

</body>
</html>
