<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-6 rounded w-80">
  <h2 class="text-xl mb-4">Upload Reel</h2>

  <input id="image" type="text" placeholder="Image URL" class="w-full p-2 mb-2 text-black">
  <input id="title" type="text" placeholder="Title" class="w-full p-2 mb-2 text-black">
  <input id="category" type="text" placeholder="Category" class="w-full p-2 mb-2 text-black">

  <button onclick="upload()" class="bg-blue-500 w-full p-2 rounded">Upload</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
  storageBucket: "reels-f0d24.appspot.com",
  messagingSenderId: "658150381663",
  appId: "1:658150381663:web:21f4e37a3163ea0f8f23ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.upload = async function() {
  const image = document.getElementById("image").value;
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;

  if(!image || !title || !category){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "reels"), {
    image,
    title,
    category
  });

  alert("Uploaded Successfully ✅");

  document.getElementById("image").value = "";
  document.getElementById("title").value = "";
  document.getElementById("category").value = "";
};

</script>

</body>
</html>
