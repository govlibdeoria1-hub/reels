<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Admin Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
    .tab-btn.active { border-bottom: 2px solid #06b6d4; color: #06b6d4; }
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; }
  </style>
</head>
<body class="p-6">

  <div id="adminMain" style="display:none;" class="max-w-5xl mx-auto">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-black tracking-tighter">CS<span class="text-cyan-400">ADMIN</span></h1>
      <div class="flex gap-6">
        <button onclick="switchTab('reels')" id="tReels" class="tab-btn active pb-2 font-bold text-sm">CONTENT</button>
        <button onclick="switchTab('users')" id="tUsers" class="tab-btn pb-2 font-bold text-sm">REGISTERED USERS</button>
        <button onclick="switchTab('notis')" id="tNotis" class="tab-btn pb-2 font-bold text-sm">BROADCAST</button>
      </div>
    </header>

    <div id="tabReels" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="glass p-6 h-fit">
        <h3 class="font-bold mb-4">Add New Reel</h3>
        <input id="imgUrl" placeholder="Image URL" class="mb-3">
        <input id="title" placeholder="Reel Title" class="mb-3">
        <input id="cat" placeholder="Category (e.g. Nature, Funny)" class="mb-3">
        <button onclick="addReel()" class="w-full bg-cyan-600 p-3 rounded-xl font-bold">Publish</button>
      </div>
      <div class="md:col-span-2 glass p-6">
        <h3 class="font-bold mb-4">Live Feed</h3>
        <div id="reelGrid" class="grid grid-cols-2 gap-4"></div>
      </div>
    </div>

    <div id="tabUsers" style="display:none;" class="glass p-6">
      <div class="flex justify-between mb-6">
        <h3 class="font-bold">Total Registered Users</h3>
        <span id="userCount" class="text-cyan-400 font-mono">0</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="text-slate-500 uppercase text-[10px] tracking-widest border-b border-white/10">
            <tr><th class="py-4 px-2">Mobile Number</th><th class="py-4">Joined Date</th></tr>
          </thead>
          <tbody id="userTableList"></tbody>
        </table>
      </div>
    </div>

    <div id="tabNotis" style="display:none;" class="max-w-lg mx-auto glass p-8">
        <h3 class="font-bold mb-6">Global Broadcast</h3>
        <input id="nTitle" placeholder="Notification Heading" class="mb-4">
        <input id="nMsg" placeholder="Message content..." class="mb-4">
        <button onclick="sendPush()" class="w-full bg-pink-600 p-4 rounded-xl font-bold">Send to All Users</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const pass = prompt("Admin Password:");
    if(pass !== "1997") { alert("Denied"); location.reload(); }
    document.getElementById('adminMain').style.display = 'block';

    const firebaseConfig = { apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const db = getFirestore(initializeApp(firebaseConfig));

    // TAB SWITCHER
    window.switchTab = (tab) => {
      ['Reels', 'Users', 'Notis'].forEach(t => {
        document.getElementById('tab'+t).style.display = 'none';
        document.getElementById('t'+t).classList.remove('active');
      });
      document.getElementById('tab'+tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
      document.getElementById('t'+tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    };

    // CONTENT
    window.addReel = async () => {
      const image = imgUrl.value, t = title.value, c = cat.value;
      if(!image || !t || !c) return alert("Fill everything");
      await addDoc(collection(db, "reels"), { image, title:t, category:c, time: Date.now() });
      imgUrl.value=''; title.value=''; cat.value='';
    };

    onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), s => {
      reelGrid.innerHTML = s.docs.map(d => `
        <div class="bg-white/5 p-2 rounded-xl border border-white/5">
          <img src="${d.data().image}" class="h-24 w-full object-cover rounded-lg mb-2">
          <p class="text-[10px] font-bold truncate">${d.data().title}</p>
          <button onclick="delDoc('reels','${d.id}')" class="text-rose-500 text-[10px] mt-2">DELETE</button>
        </div>
      `).join('');
    });

    // USERS RECORD
    onSnapshot(collection(db, "users"), s => {
      userCount.innerText = s.size;
      userTableList.innerHTML = s.docs.map(d => `
        <tr class="border-b border-white/5">
          <td class="py-4 px-2 font-mono text-cyan-400">${d.id}</td>
          <td class="py-4 text-slate-400 text-xs">${d.data().registeredAt ? new Date(d.data().registeredAt).toLocaleDateString() : 'Existing'}</td>
        </tr>
      `).join('');
    });

    // BROADCAST
    window.sendPush = async () => {
      await addDoc(collection(db, "notifications"), { title: nTitle.value, msg: nMsg.value, time: Date.now() });
      nTitle.value=''; nMsg.value=''; alert("Sent!");
    };

    window.delDoc = async (c, id) => { if(confirm("Confirm delete?")) await deleteDoc(doc(db, c, id)); };
  </script>
</body>
</html>
