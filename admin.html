<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Admin Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
    .tab-btn { padding: 10px 20px; font-weight: 700; font-size: 13px; color: #666; transition: 0.3s; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #06b6d4; border-bottom-color: #06b6d4; }
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; }
  </style>
</head>
<body class="p-6">

  <div id="adminMain" style="display:none;" class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-8 bg-white/5 p-4 rounded-2xl">
      <h1 class="text-xl font-black tracking-tighter italic">CS<span class="text-cyan-400">ADMIN</span></h1>
      <nav class="flex gap-2">
        <button onclick="switchTab('reels')" id="tReels" class="tab-btn active">CONTENT</button>
        <button onclick="switchTab('users')" id="tUsers" class="tab-btn">USER RECORDS</button>
        <button onclick="switchTab('notis')" id="tNotis" class="tab-btn">BROADCAST</button>
      </nav>
    </header>

    <div id="tabReels" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="glass p-6 h-fit">
        <h3 class="font-bold mb-4 text-cyan-400">Upload New Reel</h3>
        <div class="space-y-4">
          <input id="imgUrl" placeholder="Image URL">
          <input id="title" placeholder="Reel Title">
          <input id="cat" placeholder="Category Name (e.g. Nature)">
          <button onclick="addReel()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold hover:bg-cyan-500 transition shadow-lg shadow-cyan-500/20">Publish Now</button>
        </div>
      </div>
      <div class="lg:col-span-2 glass p-6">
        <h3 class="font-bold mb-4">Manage Feed</h3>
        <div id="reelGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 max-h-[600px] overflow-y-auto pr-2"></div>
      </div>
    </div>

    <div id="tabUsers" style="display:none;" class="glass p-8">
      <div class="flex justify-between items-center mb-8">
        <h3 class="font-bold text-xl">Member Database</h3>
        <div class="bg-cyan-500/10 text-cyan-400 px-4 py-2 rounded-full font-mono text-sm">
          Total: <span id="userCount">0</span>
        </div>
      </div>
      <div class="overflow-hidden rounded-xl border border-white/5">
        <table class="w-full text-left">
          <thead class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500">
            <tr><th class="p-4">User ID (Mobile)</th><th class="p-4">Status</th><th class="p-4">Registration Date</th></tr>
          </thead>
          <tbody id="userTableList" class="text-sm"></tbody>
        </table>
      </div>
    </div>

    <div id="tabNotis" style="display:none;" class="max-w-xl mx-auto glass p-10">
        <h3 class="font-bold text-xl mb-2">Push Notifications</h3>
        <p class="text-slate-500 text-sm mb-8">Send a global alert to all users.</p>
        <input id="nTitle" placeholder="Notification Heading" class="mb-4">
        <textarea id="nMsg" placeholder="Message content..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none mb-6 h-32"></textarea>
        <button onclick="sendPush()" class="w-full bg-pink-600 p-4 rounded-xl font-bold hover:bg-pink-500 transition">Broadcast Message</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const pass = prompt("Admin Password:");
    if(pass !== "1997") { alert("Denied"); location.reload(); }
    document.getElementById('adminMain').style.display = 'block';

    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.switchTab = (tab) => {
      ['Reels', 'Users', 'Notis'].forEach(t => {
        document.getElementById('tab'+t).style.display = 'none';
        document.getElementById('t'+t).classList.remove('active');
      });
      document.getElementById('tab'+tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
      document.getElementById('t'+tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    };

    // CONTENT MGMT
    window.addReel = async () => {
      if(!imgUrl.value || !title.value || !cat.value) return alert("All fields required");
      await addDoc(collection(db, "reels"), { image: imgUrl.value, title: title.value, category: cat.value, time: Date.now() });
      imgUrl.value=''; title.value=''; cat.value=''; alert("Published!");
    };

    onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), s => {
      reelGrid.innerHTML = s.docs.map(d => `
        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
          <img src="${d.data().image}" class="h-24 w-full object-cover rounded-lg mb-2">
          <p class="text-[10px] font-bold truncate">${d.data().title}</p>
          <span class="text-[9px] text-cyan-400 bg-cyan-400/10 px-1.5 py-0.5 rounded uppercase font-bold">${d.data().category}</span>
          <button onclick="delDoc('reels','${d.id}')" class="block w-full text-rose-500 text-[10px] mt-3 pt-2 border-t border-white/5 hover:text-rose-400">REMOVE</button>
        </div>
      `).join('');
    });

    // USER MGMT
    onSnapshot(collection(db, "users"), s => {
      userCount.innerText = s.size;
      userTableList.innerHTML = s.docs.map(d => `
        <tr class="border-b border-white/5 hover:bg-white/5 transition">
          <td class="p-4 font-mono font-bold">${d.id}</td>
          <td class="p-4 text-[10px]"><span class="bg-green-500/10 text-green-500 px-2 py-1 rounded-full uppercase">Active</span></td>
          <td class="p-4 text-slate-400 text-xs">${d.data().registeredAt ? new Date(d.data().registeredAt).toLocaleDateString() : 'Previous User'}</td>
        </tr>
      `).join('');
    });

    window.sendPush = async () => {
      if(!nTitle.value || !nMsg.value) return alert("Fill fields");
      await addDoc(collection(db, "notifications"), { title: nTitle.value, msg: nMsg.value, time: Date.now() });
      nTitle.value=''; nMsg.value=''; alert("Sent!");
    };

    window.delDoc = async (c, id) => { if(confirm("Confirm removal?")) await deleteDoc(doc(db, c, id)); };
  </script>
</body>
</html>
