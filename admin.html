<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Admin Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
    .tab-btn.active { color: #06b6d4; border-bottom: 2px solid #06b6d4; }
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; outline: none; width: 100%; }
  </style>
</head>
<body class="p-6">

  <div id="adminMain" style="display:none;" class="max-w-6xl mx-auto">
    <header class="flex flex-wrap justify-between items-center mb-8 gap-4 bg-white/5 p-4 rounded-2xl">
      <h1 class="text-xl font-black">CS<span class="text-cyan-400">ADMIN</span></h1>
      <div class="flex gap-2">
        <button onclick="switchTab('reels')" id="tReels" class="tab-btn active px-4 py-2 font-bold text-xs uppercase">Content</button>
        <button onclick="switchTab('requests')" id="tRequests" class="tab-btn px-4 py-2 font-bold text-xs uppercase text-orange-400">Requests</button>
        <button onclick="switchTab('users')" id="tUsers" class="tab-btn px-4 py-2 font-bold text-xs uppercase">Users</button>
        <button onclick="switchTab('notis')" id="tNotis" class="tab-btn px-4 py-2 font-bold text-xs uppercase">Broadcast</button>
      </div>
    </header>

    <div id="tabReels" class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="glass p-6 h-fit">
        <h3 class="font-bold mb-4">Add Reel</h3>
        <input id="imgUrl" placeholder="Image URL" class="mb-3">
        <input id="title" placeholder="Reel Title" class="mb-3">
        <button onclick="addReel()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold">Publish</button>
      </div>
      <div class="md:col-span-2 glass p-6">
        <h3 class="font-bold mb-4">Live Feed</h3>
        <div id="reelGrid" class="grid grid-cols-3 gap-4 h-[500px] overflow-y-auto"></div>
      </div>
    </div>

    <div id="tabRequests" style="display:none;" class="glass p-8">
      <h3 class="font-bold text-xl mb-6 text-orange-400">User Inquiries</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="border-b border-white/5 text-slate-500">
            <tr><th class="p-4">Name</th><th class="p-4">Mobile</th><th class="p-4">Post Requested</th><th class="p-4">Date</th><th class="p-4">Action</th></tr>
          </thead>
          <tbody id="reqTableList"></tbody>
        </table>
      </div>
    </div>

    <div id="tabUsers" style="display:none;" class="glass p-8">
      <h3 class="font-bold mb-6">User Database</h3>
      <table class="w-full text-left text-sm">
        <thead class="border-b border-white/5 text-slate-500">
          <tr><th class="p-4">Mobile Number</th><th class="p-4">Join Date</th></tr>
        </thead>
        <tbody id="userTableList"></tbody>
      </table>
    </div>

    <div id="tabNotis" style="display:none;" class="max-w-lg mx-auto glass p-8">
        <h3 class="font-bold mb-6">Send Alert</h3>
        <input id="nTitle" placeholder="Title" class="mb-4">
        <input id="nMsg" placeholder="Message..." class="mb-4">
        <button onclick="sendPush()" class="w-full bg-pink-600 p-4 rounded-xl font-bold">Push Notification</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const pass = prompt("Password:");
    if(pass === "1997") document.getElementById('adminMain').style.display = 'block'; else location.reload();

    const firebaseConfig = { apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.switchTab = (tab) => {
      ['Reels', 'Requests', 'Users', 'Notis'].forEach(t => {
        document.getElementById('tab'+t).style.display = 'none';
        document.getElementById('t'+t).classList.remove('active');
      });
      document.getElementById('tab'+tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
      document.getElementById('t'+tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    };

    // CONTENT MGMT
    window.addReel = async () => {
      await addDoc(collection(db, "reels"), { image: imgUrl.value, title: title.value, time: Date.now() });
      imgUrl.value=''; title.value='';
    };

    onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), s => {
      reelGrid.innerHTML = s.docs.map(d => `
        <div class="bg-white/5 p-2 rounded-xl text-center">
          <img src="${d.data().image}" class="h-20 w-full object-cover rounded-lg mb-2">
          <button onclick="delDoc('reels','${d.id}')" class="text-rose-500 text-[10px] font-bold">DELETE</button>
        </div>
      `).join('');
    });

    // REQUESTS MGMT
    onSnapshot(query(collection(db, "requests"), orderBy("time", "desc")), s => {
      reqTableList.innerHTML = s.docs.map(d => `
        <tr class="border-b border-white/5 hover:bg-white/5 transition">
          <td class="p-4 font-bold text-cyan-400">${d.data().userName}</td>
          <td class="p-4 font-mono">${d.data().userMobile}</td>
          <td class="p-4 text-xs italic">${d.data().postTitle}</td>
          <td class="p-4 text-slate-500 text-[10px]">${new Date(d.data().time).toLocaleDateString()}</td>
          <td class="p-4"><button onclick="delDoc('requests','${d.id}')" class="text-rose-500 text-xs">Clear</button></td>
        </tr>
      `).join('');
    });

    // USER MGMT
    onSnapshot(collection(db, "users"), s => {
      userTableList.innerHTML = s.docs.map(d => `
        <tr class="border-b border-white/5"><td class="p-4 font-mono">${d.id}</td><td class="p-4 text-slate-500">${d.data().registeredAt ? new Date(d.data().registeredAt).toLocaleDateString() : 'Existing'}</td></tr>
      `).join('');
    });

    window.sendPush = async () => {
      await addDoc(collection(db, "notifications"), { title: nTitle.value, msg: nMsg.value, time: Date.now() });
      nTitle.value=''; nMsg.value=''; alert("Sent!");
    };

    window.delDoc = async (c, id) => { if(confirm("Confirm removal?")) await deleteDoc(doc(db, c, id)); };
  </script>
</body>
</html>
