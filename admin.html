<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; backdrop-filter: blur(10px); }
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; outline: none; }
    input:focus { border-color: #06b6d4; }
  </style>
</head>
<body class="p-6">

  <div id="adminMain" style="display:none;" class="max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-10">
      <h1 class="text-2xl font-black italic">Current<span class="text-cyan-400">Admin</span></h1>
      <button onclick="location.reload()" class="bg-white/10 px-4 py-2 rounded-xl text-xs">LOGOUT</button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <section class="glass p-6">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-plus text-cyan-400"></i> Add Reel</h2>
        <div class="flex flex-col gap-3">
          <input id="image" placeholder="Image URL">
          <input id="title" placeholder="Reel Title">
          <button onclick="addReel()" class="bg-cyan-500 p-3 rounded-xl font-bold mt-2 hover:bg-cyan-400 transition">Publish Reel</button>
        </div>

        <h2 class="text-lg font-bold mt-10 mb-4">Live Reels</h2>
        <div id="reelList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
      </section>

      <section class="glass p-6">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-bullhorn text-pink-500"></i> Broadcast</h2>
        <div class="flex flex-col gap-3">
          <input id="notiTitle" placeholder="Notification Heading">
          <input id="notiMsg" placeholder="Short Message...">
          <button onclick="sendNoti()" class="bg-pink-600 p-3 rounded-xl font-bold mt-2 hover:bg-pink-500 transition">Push Notification</button>
        </div>

        <h2 class="text-lg font-bold mt-10 mb-4 text-gray-500">History</h2>
        <div id="notiHistory" class="space-y-3"></div>
      </section>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const pass = prompt("Admin Password:");
    if(pass === "1997") { document.getElementById('adminMain').style.display = 'block'; }
    else { alert("Wrong!"); location.reload(); }

    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // REELS LOGIC
    window.addReel = async () => {
      const image = document.getElementById('image').value;
      const title = document.getElementById('title').value;
      if(!image || !title) return alert("Fill fields");
      await addDoc(collection(db, "reels"), { image, title, time: Date.now() });
      document.getElementById('image').value = ''; document.getElementById('title').value = '';
    };

    onSnapshot(query(collection(db, "reels"), orderBy("time", "desc")), s => {
      reelList.innerHTML = s.docs.map(d => `
        <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl">
          <span class="text-sm truncate mr-4">${d.data().title}</span>
          <button onclick="window.delDoc('reels', '${d.id}')" class="text-rose-500 text-xs">DELETE</button>
        </div>
      `).join('');
    });

    // NOTIFICATION LOGIC
    window.sendNoti = async () => {
      const title = document.getElementById('notiTitle').value;
      const msg = document.getElementById('notiMsg').value;
      if(!title || !msg) return alert("Fill fields");
      await addDoc(collection(db, "notifications"), { title, msg, time: Date.now() });
      document.getElementById('notiTitle').value = ''; document.getElementById('notiMsg').value = '';
    };

    onSnapshot(query(collection(db, "notifications"), orderBy("time", "desc"), limit(5)), s => {
      notiHistory.innerHTML = s.docs.map(d => `
        <div class="bg-white/5 p-3 rounded-xl border-l-4 border-pink-500">
          <div class="flex justify-between items-start">
            <p class="text-xs font-bold">${d.data().title}</p>
            <button onclick="window.delDoc('notifications', '${d.id}')" class="text-[10px] text-gray-500">REMOVE</button>
          </div>
          <p class="text-[10px] text-gray-400 mt-1">${d.data().msg}</p>
        </div>
      `).join('');
    });

    window.delDoc = async (col, id) => { if(confirm("Delete?")) await deleteDoc(doc(db, col, id)); };
  </script>
</body>
</html>
