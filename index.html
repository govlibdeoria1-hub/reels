<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: sans-serif;
    }

    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-size: 20px;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s;
      z-index: 100;
    }

    .menu.open {
      left: 0;
    }

    .menu button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
    }

    .hamburger {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 24px;
      color: white;
      z-index: 200;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ☰ Menu Button -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- Sidebar Menu -->
<div id="menu" class="menu">
  <h2>Menu</h2>
  <button onclick="loadHome()">Home</button>
  <button onclick="loadLiked()">Liked</button>
  <button onclick="loadSaved()">Saved</button>
</div>

<!-- Reels Container -->
<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

let allReels = [];

// ☰ Toggle Menu
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
};

// 🏠 Home
window.loadHome = () => {
  render(allReels);
  toggleMenu();
};

// ❤️ Liked
window.loadLiked = () => {
  const likedReels = allReels.filter(item => (item.likes || 0) > 0);
  render(likedReels);
  toggleMenu();
};

// 🔖 Saved
window.loadSaved = () => {
  const savedReels = allReels.filter(item => (item.saves || 0) > 0);
  render(savedReels);
  toggleMenu();
};

// ❤️ Like Function
window.likeReel = async (id) => {
  const ref = doc(db, "reels", id);
  await updateDoc(ref, {
    likes: increment(1)
  });
};

// 🔖 Save Function
window.saveReel = async (id) => {
  const ref = doc(db, "reels", id);
  await updateDoc(ref, {
    saves: increment(1)
  });
};

// 🎥 Render Reels
function render(data) {

  container.innerHTML = "";

  data.forEach((item) => {

    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${item.image}" />

      <div class="overlay">
        <h2>${item.title || ""}</h2>
        <p>${item.category || ""}</p>
      </div>

      <div class="actions">
        <div onclick="likeReel('${item.id}')">❤️ ${item.likes || 0}</div>
        <div onclick="saveReel('${item.id}')">🔖 ${item.saves || 0}</div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// 🔥 Firebase Real-time Data
onSnapshot(collection(db, "reels"), (snapshot) => {

  allReels = [];

  snapshot.forEach((docSnap) => {
    allReels.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  render(allReels);
});

</script>

</body>
</html>
