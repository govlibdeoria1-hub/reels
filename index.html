<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; background: black; overflow: hidden; }

    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-size: 20px;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s;
      z-index: 100;
    }

    .menu.open { left: 0; }

    .hamburger {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 24px;
      color: white;
      z-index: 200;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadLiked()">Liked</button>
  <button onclick="loadSaved()">Saved</button>
</div>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

let allReels = [];

// 🔥 MENU
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
};

window.loadHome = () => render(allReels);

window.loadLiked = () => {
  render(allReels.sort((a,b)=> (b.likes||0)-(a.likes||0)));
};

window.loadSaved = () => {
  render(allReels.sort((a,b)=> (b.saves||0)-(a.saves||0)));
};

// ❤️ LIKE
window.likeReel = async (id) => {
  const ref = doc(db, "reels", id);
  await updateDoc(ref, {
    likes: increment(1)
  });
};

// 🔖 SAVE
window.saveReel = async (id) => {
  const ref = doc(db, "reels", id);
  await updateDoc(ref, {
    saves: increment(1)
  });
};

// 🎥 RENDER
function render(data){

  container.innerHTML = "";

  data.forEach((item) => {

    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${item.image}" />

      <div class="overlay">
        <h2>${item.title || ""}</h2>
        <p>${item.category || ""}</p>
      </div>

      <div class="actions">
        <div onclick="likeReel('${item.id}')">❤️ ${item.likes || 0}</div>
        <div onclick="saveReel('${item.id}')">🔖 ${item.saves || 0}</div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// 🔥 FIREBASE DATA
onSnapshot(collection(db, "reels"), (snapshot) => {

  allReels = [];

  snapshot.forEach((docSnap) => {
    allReels.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  render(allReels);
});

</script>

</body>
</html>
