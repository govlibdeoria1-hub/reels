<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin:0; background:black; overflow:hidden; }

    #container {
      height:100vh;
      overflow-y:scroll;
      scroll-snap-type:y mandatory;
    }

    .reel {
      height:100vh;
      scroll-snap-align:start;
      position:relative;
    }

    img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .overlay {
      position:absolute;
      bottom:20px;
      left:10px;
      color:white;
    }

    .actions {
      position:absolute;
      right:10px;
      bottom:100px;
      color:white;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu {
      position:fixed;
      left:-260px;
      top:0;
      width:260px;
      height:100%;
      background:#121212;
      padding:20px;
      transition:.3s;
    }

    .menu.open { left:0; }

    .hamburger {
      position:fixed;
      top:15px;
      left:15px;
      color:white;
      font-size:24px;
      z-index:100;
    }

    /* LOGIN */
    #login {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <h2 class="text-white mb-4">Login</h2>
  <input id="name" placeholder="Name" class="p-2 mb-2">
  <input id="mobile" placeholder="Mobile" class="p-2 mb-2">
  <button onclick="loginUser()" class="bg-green-500 p-2">Login</button>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu text-white">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadLiked()">Liked</button>
  <button onclick="loadSaved()">Saved</button>
</div>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("userId");

// 🔐 LOGIN
window.loginUser = async () => {
  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;

  if(!name || !mobile){
    alert("Fill details");
    return;
  }

  userId = mobile;

  await setDoc(doc(db,"users",userId), {
    name,
    mobile,
    liked: [],
    saved: []
  }, { merge:true });

  localStorage.setItem("userId", userId);
  document.getElementById("login").style.display = "none";

  loadApp();
};

// AUTO LOGIN
if(userId){
  document.getElementById("login").style.display = "none";
  loadApp();
}

const container = document.getElementById("container");
let allReels = [];
let userData = { liked:[], saved:[] };

// 🔥 LOAD APP
function loadApp(){

  // user data
  onSnapshot(doc(db,"users",userId), (docSnap)=>{
    userData = docSnap.data() || { liked:[], saved:[] };
    render(allReels);
  });

  // reels
  onSnapshot(collection(db,"reels"), (snap)=>{
    allReels = [];
    snap.forEach(d=>{
      allReels.push({ id:d.id, ...d.data() });
    });
    render(allReels);
  });
}

// ❤️ LIKE
window.toggleLike = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.liked.includes(id)){
    await updateDoc(ref,{ liked: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ liked: arrayUnion(id) });
  }
};

// 🔖 SAVE
window.toggleSave = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.saved.includes(id)){
    await updateDoc(ref,{ saved: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ saved: arrayUnion(id) });
  }
};

// 🎥 RENDER
function render(data){
  container.innerHTML="";

  data.forEach(item=>{
    const reel=document.createElement("div");
    reel.className="reel";

    reel.innerHTML=`
      <img src="${item.image}">
      <div class="overlay">
        <h2>${item.title||""}</h2>
      </div>
      <div class="actions">
        <div onclick="toggleLike('${item.id}')">
          ${userData.liked.includes(item.id)?"❤️":"🤍"}
        </div>
        <div onclick="toggleSave('${item.id}')">
          ${userData.saved.includes(item.id)?"🔖":"📑"}
        </div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// MENU
window.toggleMenu=()=>{
  document.getElementById("menu").classList.toggle("open");
};

window.loadHome=()=>render(allReels);
window.loadLiked=()=>render(allReels.filter(r=>userData.liked.includes(r.id)));
window.loadSaved=()=>render(allReels.filter(r=>userData.saved.includes(r.id)));

</script>

</body>
</html>
