<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      overflow: hidden;
    }

    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      position: relative;
      z-index: 1;
    }

    .reel {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      z-index: 1;
    }

    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
      z-index: 2;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 2;
      font-size: 20px;
    }

    /* 🔥 HAMBURGER */
    .hamburger {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 26px;
      color: white;
      z-index: 9999;
      cursor: pointer;
    }

    /* 🔥 MENU */
    .menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #121212;
      padding: 20px;
      transition: 0.3s;
      z-index: 9998;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .menu.open {
      left: 0;
    }

    .menu h2 {
      color: white;
      margin-bottom: 20px;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1e1e1e;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .menu button:hover {
      background: #333;
    }

    /* LOGIN */
    #login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2 class="text-white mb-4">Login</h2>
  <input id="name" placeholder="Name">
  <input id="mobile" placeholder="Mobile">
  <button onclick="loginUser()" class="bg-green-500 p-2 mt-2">Login</button>
</div>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
  <h2>📱 Menu</h2>
  <button onclick="loadHome()">🏠 Home</button>
  <button onclick="loadLiked()">❤️ Liked</button>
  <button onclick="loadSaved()">🔖 Saved</button>
</div>

<!-- REELS -->
<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("userId");

// LOGIN
window.loginUser = async () => {
  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;

  if (!name || !mobile) {
    alert("Enter details");
    return;
  }

  userId = mobile;

  await setDoc(doc(db,"users",userId), {
    name,
    mobile,
    liked: [],
    saved: []
  }, { merge:true });

  localStorage.setItem("userId", userId);
  document.getElementById("login").style.display = "none";

  loadApp();
};

// AUTO LOGIN
if(userId){
  document.getElementById("login").style.display = "none";
  loadApp();
}

const container = document.getElementById("container");

let allReels = [];
let userData = { liked:[], saved:[] };

function loadApp(){

  // USER DATA
  onSnapshot(doc(db,"users",userId), (snap)=>{
    userData = snap.data() || { liked:[], saved:[] };
    render(allReels);
  });

  // REELS
  onSnapshot(collection(db,"reels"), (snap)=>{
    allReels = [];
    snap.forEach(d=>{
      allReels.push({ id:d.id, ...d.data() });
    });
    render(allReels);
  });
}

// LIKE
window.toggleLike = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.liked.includes(id)){
    await updateDoc(ref,{ liked: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ liked: arrayUnion(id) });
  }
};

// SAVE
window.toggleSave = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.saved.includes(id)){
    await updateDoc(ref,{ saved: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ saved: arrayUnion(id) });
  }
};

// RENDER
function render(data){
  container.innerHTML = "";

  data.forEach(item=>{
    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${item.image}">
      <div class="overlay">
        <h3>${item.title || ""}</h3>
      </div>

      <div class="actions">
        <div onclick="toggleLike('${item.id}')">
          ${userData.liked.includes(item.id) ? "❤️" : "🤍"}
        </div>
        <div onclick="toggleSave('${item.id}')">
          ${userData.saved.includes(item.id) ? "🔖" : "📑"}
        </div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// MENU
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
};

window.loadHome = () => render(allReels);

window.loadLiked = () => {
  render(allReels.filter(r => userData.liked.includes(r.id)));
};

window.loadSaved = () => {
  render(allReels.filter(r => userData.saved.includes(r.id)));
};

</script>

</body>
</html>
