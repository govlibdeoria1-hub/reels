<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Request Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #6366f1; --secondary: #06b6d4; --glass-border: rgba(255, 255, 255, 0.15); }
    body { margin: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

    #login { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at top right, #1e1b4b, #000); display: flex; justify-content: center; align-items: center; }
    .login-card { width: 90%; max-width: 380px; padding: 45px 30px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; text-align: center; }

    #container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
    #container::-webkit-scrollbar { display: none; }
    .reel { height: 100vh; width: 100%; position: relative; scroll-snap-align: start; scroll-snap-stop: always; }
    .reel img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 70%, rgba(0,0,0,0.9) 100%); pointer-events: none; }

    /* UI ELEMENTS */
    .nav-trigger, .noti-trigger { position: fixed; top: 25px; z-index: 999; width: 48px; height: 48px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; }
    .nav-trigger { left: 25px; }
    .noti-trigger { right: 25px; }
    .noti-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: #f43f5e; border-radius: 50%; display: none; }

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 997; display: none; backdrop-filter: blur(4px); }
    .sidebar, .noti-pane { position: fixed; top: 0; height: 100%; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(40px); z-index: 998; transition: 0.4s ease; border: 1px solid var(--glass-border); }
    .sidebar { left: -320px; width: 300px; padding: 100px 24px; }
    .sidebar.open { left: 0; }
    .noti-pane { right: -350px; width: 320px; padding: 100px 20px 20px; }
    .noti-pane.open { right: 0; }

    /* REQUEST MODAL */
    #requestModal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; }
    .modal-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 350px; border: 1px solid var(--glass-border); }

    .actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
    .action-circle { width: 50px; height: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; font-size: 20px; }
    .action-circle.liked { color: #f43f5e; border-color: #f43f5e; }
    .action-circle.saved { color: #f59e0b; border-color: #f59e0b; }
    .btn-req { background: #06b6d4; color: white; border: none; font-size: 16px; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }

    .nav-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 18px; color: #64748b; cursor: pointer; margin-bottom: 8px; }
    .nav-item.active { background: rgba(255,255,255,0.08); color: white; }
  </style>
</head>
<body>

  <div id="login">
    <div class="login-card">
      <h1 class="text-3xl font-black mb-6 italic">Current<span class="text-cyan-400">Swipe</span></h1>
      <input id="mobileInput" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none">
      <button id="loginBtn" class="w-full p-4 bg-gradient-to-r from-indigo-600 to-cyan-500 rounded-2xl font-bold uppercase">Enter</button>
    </div>
  </div>

  <div id="requestModal">
    <div class="modal-card">
      <h2 class="text-xl font-bold mb-2">Send Request</h2>
      <p id="reqPostName" class="text-cyan-400 text-xs mb-6 uppercase font-bold tracking-widest"></p>
      <input id="userName" placeholder="Your Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none">
      <div class="flex gap-2">
        <button onclick="closeRequest()" class="flex-1 p-4 bg-white/5 rounded-2xl text-sm">Cancel</button>
        <button onclick="submitRequest()" class="flex-1 p-4 bg-cyan-500 rounded-2xl text-sm font-bold">Submit</button>
      </div>
    </div>
  </div>

  <div class="nav-trigger" id="menuToggle"><i class="fa-solid fa-bars-staggered"></i></div>
  <div class="noti-trigger" id="notiToggle"><i class="fa-solid fa-bell"></i><div class="noti-dot" id="notiDot"></div></div>
  <div id="overlay"></div>

  <div id="sidebar" class="sidebar">
    <div class="nav-item active" id="navHome"><i class="fa-solid fa-house"></i> Feed</div>
    <div class="nav-item" id="navLiked"><i class="fa-solid fa-heart"></i> Liked</div>
    <div class="nav-item" id="navSaved"><i class="fa-solid fa-bookmark"></i> Saved</div>
    <div class="nav-item text-rose-500 mt-10" id="navLogout"><i class="fa-solid fa-power-off"></i> Logout</div>
  </div>

  <div id="notiPane" class="noti-pane">
    <h2 class="text-xl font-bold mb-6">Notifications</h2>
    <div id="notiList" class="space-y-4"></div>
  </div>

  <div id="container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove, query, orderBy, limit, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let userId = localStorage.getItem("userId");
    let allReels = [], userData = { liked: [], saved: [] }, activeReqPost = "";

    const render = (data) => {
      container.innerHTML = data.map(item => `
        <div class="reel">
          <img src="${item.image}">
          <div class="vignette"></div>
          <div class="absolute bottom-12 left-6 right-20 pointer-events-none">
            <p class="text-white font-bold text-lg">${item.title}</p>
          </div>
          <div class="actions">
            <div class="action-circle btn-req" onclick="openRequest('${item.title}')">
              <i class="fa-solid fa-paper-plane"></i>
            </div>
            <div class="action-circle ${userData.liked?.includes(item.id) ? 'liked' : ''}" onclick="window.toggleAction('${item.id}', 'liked')">
              <i class="fa-solid fa-heart"></i>
            </div>
            <div class="action-circle ${userData.saved?.includes(item.id) ? 'saved' : ''}" onclick="window.toggleAction('${item.id}', 'saved')">
              <i class="fa-solid fa-bookmark"></i>
            </div>
          </div>
        </div>
      `).join('');
    };

    window.openRequest = (title) => {
        activeReqPost = title;
        document.getElementById('reqPostName').innerText = title;
        document.getElementById('requestModal').style.display = 'flex';
    };
    window.closeRequest = () => document.getElementById('requestModal').style.display = 'none';
    window.submitRequest = async () => {
        const name = document.getElementById('userName').value;
        if(!name) return alert("Please enter your name");
        await addDoc(collection(db, "requests"), {
            userName: name,
            userMobile: userId,
            postTitle: activeReqPost,
            time: Date.now()
        });
        alert("Request Sent Successfully!");
        closeRequest();
    };

    window.toggleAction = async (id, field) => {
      const isPresent = userData[field]?.includes(id);
      await updateDoc(doc(db, "users", userId), { [field]: isPresent ? arrayRemove(id) : arrayUnion(id) });
    };

    const loadApp = () => {
      onSnapshot(doc(db, "users", userId), s => { userData = s.data() || {liked:[], saved:[]}; render(allReels); });
      onSnapshot(collection(db, "reels"), s => { allReels = s.docs.map(d => ({id:d.id, ...d.data()})); render(allReels); });
      onSnapshot(query(collection(db, "notifications"), orderBy("time", "desc"), limit(5)), s => {
        notiDot.style.display = s.empty ? "none" : "block";
        notiList.innerHTML = s.docs.map(d => `<div class="bg-white/5 p-4 rounded-xl border border-white/10"><p class="text-sm font-bold text-cyan-400">${d.data().title}</p><p class="text-xs opacity-60">${d.data().msg}</p></div>`).join('');
      });
    };

    overlay.onclick = () => { sidebar.classList.remove("open"); notiPane.classList.remove("open"); overlay.style.display = "none"; };
    menuToggle.onclick = () => { sidebar.classList.add("open"); overlay.style.display = "block"; };
    notiToggle.onclick = () => { notiPane.classList.add("open"); overlay.style.display = "block"; notiDot.style.display = "none"; };

    loginBtn.onclick = async () => {
      if(!mobileInput.value) return;
      userId = mobileInput.value;
      await setDoc(doc(db, "users", userId), {liked:[], saved:[], registeredAt: Date.now()}, {merge:true});
      localStorage.setItem("userId", userId);
      login.style.display = "none";
      loadApp();
    };

    if(userId) { login.style.display = "none"; loadApp(); }
  </script>
</body>
</html>
