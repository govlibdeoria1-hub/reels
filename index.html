<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #6366f1; --secondary: #06b6d4; --glass-border: rgba(255, 255, 255, 0.15); }
    body { margin: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

    /* --- LOGIN --- */
    #login { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at top right, #1e1b4b, #000); display: flex; justify-content: center; align-items: center; transition: opacity 0.5s; }
    .login-card { width: 90%; max-width: 380px; padding: 45px 30px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; text-align: center; }

    /* --- FEED --- */
    #container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
    #container::-webkit-scrollbar { display: none; }
    .reel { height: 100vh; position: relative; scroll-snap-align: start; }
    .reel img { width: 100%; height: 100%; object-fit: cover; }
    .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 25%, transparent 65%, rgba(0,0,0,0.85) 100%); pointer-events: none; }

    /* --- UI ELEMENTS --- */
    .nav-trigger, .noti-trigger { position: fixed; top: 25px; z-index: 999; width: 48px; height: 48px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; }
    .nav-trigger { left: 25px; }
    .noti-trigger { right: 25px; }
    .noti-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 10px #f43f5e; display: none; }

    .sidebar, .noti-pane { position: fixed; top: 0; height: 100%; background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(40px); z-index: 998; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border); }
    .sidebar { left: -320px; width: 300px; padding: 100px 24px; }
    .sidebar.open { left: 0; }
    .noti-pane { right: -350px; width: 320px; padding: 100px 20px 20px; }
    .noti-pane.open { right: 0; }

    .nav-item { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 18px; color: #64748b; cursor: pointer; transition: 0.3s; }
    .nav-item.active { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
    
    .actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; }
    .action-circle { width: 55px; height: 55px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; font-size: 22px; }
    .action-circle.liked { color: #f43f5e; }
  </style>
</head>
<body>

  <div id="login">
    <div class="login-card">
      <h1 class="text-3xl font-black mb-6 italic">Current<span class="text-cyan-400">Swipe</span></h1>
      <input id="mobileInput" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none focus:border-cyan-400">
      <button id="loginBtn" class="w-full p-4 bg-gradient-to-r from-indigo-500 to-cyan-500 rounded-2xl font-bold uppercase tracking-wider">Start Swiping</button>
    </div>
  </div>

  <div class="nav-trigger" id="menuToggle"><i class="fa-solid fa-bars-staggered"></i></div>
  <div class="noti-trigger" id="notiToggle">
    <i class="fa-solid fa-bell"></i>
    <div class="noti-dot" id="notiDot"></div>
  </div>

  <div id="sidebar" class="sidebar">
    <div class="nav-item active" id="navHome"><i class="fa-solid fa-house"></i> Feed</div>
    <div class="nav-item" id="navLiked"><i class="fa-solid fa-heart"></i> Liked</div>
    <div class="nav-item" id="navSaved"><i class="fa-solid fa-bookmark"></i> Saved</div>
    <div class="nav-item text-rose-400 mt-10" id="navLogout"><i class="fa-solid fa-power-off"></i> Logout</div>
    <div class="absolute bottom-10 left-6 text-sm opacity-40" id="userDisplay">User</div>
  </div>

  <div id="notiPane" class="noti-pane">
    <h2 class="text-xl font-bold mb-6 px-2">Notifications</h2>
    <div id="notiList" class="space-y-4">
      </div>
  </div>

  <div id="container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "reels-f0d24.firebaseapp.com", projectId: "reels-f0d24" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = localStorage.getItem("userId");
    let allReels = [], userData = { liked: [], saved: [] };
    let currentView = 'home';

    // UI Logic
    const render = (data) => {
      container.innerHTML = data.map(item => `
        <div class="reel">
          <img src="${item.image}" loading="lazy">
          <div class="vignette"></div>
          <div class="absolute bottom-12 left-6 right-20">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-[10px] font-bold">CS</div>
              <span class="font-bold">Current Swipe</span>
            </div>
            <p class="text-sm opacity-80">${item.title}</p>
          </div>
          <div class="actions">
            <div class="action-circle ${userData.liked.includes(item.id) ? 'liked' : ''}" onclick="window.toggleAction('${item.id}', 'liked')">
              <i class="fa-solid fa-heart"></i>
            </div>
          </div>
        </div>
      `).join('');
    };

    window.toggleAction = async (id, field) => {
      const isPresent = userData[field].includes(id);
      await updateDoc(doc(db, "users", userId), { [field]: isPresent ? arrayRemove(id) : arrayUnion(id) });
    };

    const loadApp = () => {
      userDisplay.innerText = `Account: ${userId}`;
      onSnapshot(doc(db, "users", userId), s => { userData = s.data() || {liked:[], saved:[]}; refresh(); });
      onSnapshot(collection(db, "reels"), s => { allReels = s.docs.map(d => ({id:d.id, ...d.data()})); refresh(); });
      
      // Notification Logic
      onSnapshot(query(collection(db, "notifications"), orderBy("time", "desc"), limit(10)), s => {
        notiDot.style.display = s.empty ? "none" : "block";
        notiList.innerHTML = s.docs.map(d => `
          <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
            <p class="text-sm font-bold text-cyan-400 mb-1">${d.data().title}</p>
            <p class="text-xs opacity-60">${d.data().msg}</p>
          </div>
        `).join('');
      });
    };

    const refresh = () => {
      if(currentView === 'home') render(allReels);
      else if(currentView === 'liked') render(allReels.filter(r => userData.liked.includes(r.id)));
      else if(currentView === 'saved') render(allReels.filter(r => userData.saved.includes(r.id)));
    };

    loginBtn.onclick = async () => {
      if(!mobileInput.value) return;
      userId = mobileInput.value;
      await setDoc(doc(db, "users", userId), {liked:[], saved:[]}, {merge:true});
      localStorage.setItem("userId", userId);
      login.style.display = "none";
      loadApp();
    };

    menuToggle.onclick = () => sidebar.classList.toggle("open");
    notiToggle.onclick = () => { notiPane.classList.toggle("open"); notiDot.style.display = "none"; };
    navLogout.onclick = () => { localStorage.clear(); location.reload(); };

    if(userId) { login.style.display = "none"; loadApp(); }
  </script>
</body>
</html>
