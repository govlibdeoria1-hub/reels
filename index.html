<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #6366f1; --secondary: #06b6d4; --glass-border: rgba(255, 255, 255, 0.15); }
    body { margin: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

    /* --- LOGIN --- */
    #login { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at top right, #1e1b4b, #000); display: flex; justify-content: center; align-items: center; transition: opacity 0.5s; }
    .login-card { width: 90%; max-width: 380px; padding: 45px 30px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; text-align: center; }

    /* --- FEED --- */
    #container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
    #container::-webkit-scrollbar { display: none; }
    .reel { height: 100vh; position: relative; scroll-snap-align: start; }
    .reel img { width: 100%; height: 100%; object-fit: cover; }
    .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 25%, transparent 65%, rgba(0,0,0,0.85) 100%); pointer-events: none; }

    /* --- UI ELEMENTS --- */
    .nav-trigger, .noti-trigger { position: fixed; top: 25px; z-index: 999; width: 48px; height: 48px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; }
    .nav-trigger { left: 25px; }
    .noti-trigger { right: 25px; }
    .noti-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 10px #f43f5e; display: none; }

    .sidebar, .noti-pane { position: fixed; top: 0; height: 100%; background: rgba(8, 8, 8, 0.95); backdrop-filter: blur(40px); z-index: 998; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border); }
    .sidebar { left: -320px; width: 300px; padding: 80px 20px 20px; overflow-y: auto; }
    .sidebar.open { left: 0; }
    .noti-pane { right: -350px; width: 320px; padding: 100px 20px 20px; }
    .noti-pane.open { right: 0; }

    .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 16px; color: #64748b; cursor: pointer; transition: 0.3s; margin-bottom: 4px; font-size: 14px; }
    .nav-item.active { background: rgba(255,255,255,0.08); color: white; border: 1px solid var(--glass-border); }
    
    .cat-item { padding: 10px 16px; border-radius: 12px; font-size: 13px; color: #94a3b8; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
    .cat-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .cat-item.active { border-color: var(--secondary); color: var(--secondary); background: rgba(6, 182, 212, 0.05); }

    .actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; }
    .action-circle { width: 55px; height: 55px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; font-size: 22px; transition: 0.2s; }
    .action-circle.liked { color: #f43f5e; border-color: #f43f5e; }
    .action-circle.saved { color: #f59e0b; border-color: #f59e0b; }
  </style>
</head>
<body>

  <div id="login">
    <div class="login-card">
      <div class="w-16 h-16 bg-cyan-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-cyan-500/30">
        <i class="fa-solid fa-bolt text-3xl text-cyan-400"></i>
      </div>
      <h1 class="text-3xl font-black mb-2 italic tracking-tighter">Current<span class="text-cyan-400">Swipe</span></h1>
      <p class="text-slate-400 mb-8 text-xs uppercase tracking-widest">Premium Content Flow</p>
      <input id="mobileInput" type="tel" placeholder="Enter Mobile Number" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none focus:border-cyan-400">
      <button id="loginBtn" class="w-full p-4 bg-gradient-to-r from-indigo-600 to-cyan-500 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-xl shadow-cyan-500/10">Enter App</button>
    </div>
  </div>

  <div class="nav-trigger" id="menuToggle"><i class="fa-solid fa-bars-staggered"></i></div>
  <div class="noti-trigger" id="notiToggle"><i class="fa-solid fa-bell"></i><div class="noti-dot" id="notiDot"></div></div>

  <div id="sidebar" class="sidebar">
    <div class="text-[10px] font-bold text-slate-500 tracking-widest mb-4 px-4 uppercase">Main Menu</div>
    <div class="nav-item active" id="navHome"><i class="fa-solid fa-house"></i> Feed</div>
    <div class="nav-item" id="navLiked"><i class="fa-solid fa-heart"></i> Liked</div>
    <div class="nav-item" id="navSaved"><i class="fa-solid fa-bookmark"></i> Saved</div>
    
    <div class="text-[10px] font-bold text-slate-500 tracking-widest mt-8 mb-4 px-4 uppercase">Categories</div>
    <div id="catList" class="space-y-1 px-2">
      </div>

    <div class="nav-item text-rose-500 mt-10" id="navLogout"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
  </div>

  <div id="notiPane" class="noti-pane">
    <h2 class="text-xl font-bold mb-6 px-2">Notifications</h2>
    <div id="notiList" class="space-y-4"></div>
  </div>

  <div id="container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // PASTE YOUR CONFIG HERE
    const firebaseConfig = { 
        apiKey: "YOUR_API_KEY", 
        authDomain: "reels-f0d24.firebaseapp.com", 
        projectId: "reels-f0d24" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = localStorage.getItem("userId");
    let allReels = [], userData = { liked: [], saved: [] };
    let currentView = 'home'; 
    let activeCategory = null;

    const render = (data) => {
      container.innerHTML = data.length ? data.map(item => `
        <div class="reel">
          <img src="${item.image}" loading="lazy">
          <div class="vignette"></div>
          <div class="absolute bottom-12 left-6 right-20">
            <div class="flex items-center gap-2 mb-2">
              <span class="bg-cyan-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase">${item.category || 'General'}</span>
            </div>
            <p class="text-white font-bold text-lg">${item.title}</p>
          </div>
          <div class="actions">
            <div class="action-circle ${userData.liked.includes(item.id) ? 'liked' : ''}" onclick="window.toggleAction('${item.id}', 'liked')"><i class="fa-solid fa-heart"></i></div>
            <div class="action-circle ${userData.saved.includes(item.id) ? 'saved' : ''}" onclick="window.toggleAction('${item.id}', 'saved')"><i class="fa-solid fa-bookmark"></i></div>
          </div>
        </div>
      `).join('') : `<div class="h-screen flex items-center justify-center text-slate-500">No content found</div>`;
    };

    window.toggleAction = async (id, field) => {
      const isPresent = userData[field].includes(id);
      await updateDoc(doc(db, "users", userId), { [field]: isPresent ? arrayRemove(id) : arrayUnion(id) });
    };

    const refreshView = () => {
      let filtered = [...allReels];
      if (currentView === 'liked') filtered = allReels.filter(r => userData.liked.includes(r.id));
      else if (currentView === 'saved') filtered = allReels.filter(r => userData.saved.includes(r.id));
      else if (activeCategory) filtered = allReels.filter(r => r.category === activeCategory);
      render(filtered);
    };

    const loadApp = () => {
      onSnapshot(doc(db, "users", userId), s => { userData = s.data() || {liked:[], saved:[]}; refreshView(); });
      
      onSnapshot(collection(db, "reels"), s => {
        allReels = s.docs.map(d => ({ id: d.id, ...d.data() }));
        
        // Dynamic Category List Generation
        const cats = [...new Set(allReels.map(r => r.category).filter(Boolean))];
        catList.innerHTML = cats.map(c => `
          <div class="cat-item ${activeCategory === c ? 'active' : ''}" onclick="window.filterCat('${c}')">
            ${c}
          </div>
        `).join('');
        
        refreshView();
      });

      onSnapshot(query(collection(db, "notifications"), orderBy("time", "desc"), limit(5)), s => {
        notiDot.style.display = s.empty ? "none" : "block";
        notiList.innerHTML = s.docs.map(d => `<div class="bg-white/5 p-4 rounded-xl border border-white/5"><p class="text-sm font-bold text-cyan-400">${d.data().title}</p><p class="text-xs opacity-60">${d.data().msg}</p></div>`).join('');
      });
    };

    window.filterCat = (cat) => {
      activeCategory = cat; 
      currentView = 'category';
      // Reset main menu highlights
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      sidebar.classList.remove('open');
      refreshView();
    };

    navHome.onclick = () => { 
        activeCategory = null; 
        currentView = 'home'; 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        navHome.classList.add('active');
        refreshView(); 
        sidebar.classList.remove('open'); 
    };

    loginBtn.onclick = async () => {
      const val = mobileInput.value; if(!val) return;
      userId = val;
      await setDoc(doc(db, "users", userId), {liked:[], saved:[], registeredAt: Date.now()}, {merge:true});
      localStorage.setItem("userId", userId);
      login.style.display = "none";
      loadApp();
    };

    menuToggle.onclick = () => sidebar.classList.toggle("open");
    notiToggle.onclick = () => { notiPane.classList.toggle("open"); notiDot.style.display = "none"; };
    navLogout.onclick = () => { localStorage.clear(); location.reload(); };
    if(userId) { login.style.display = "none"; loadApp(); }
  </script>
</body>
</html>
