<!DOCTYPE html>
<html>
<head>
  <title>Current Affairs Reels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }
  </style>
</head>

<body>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

// 🔥 Load reels
onSnapshot(collection(db, "reels"), (snapshot) => {

  container.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${data.image}" />
      <div class="overlay">
        <h2>${data.title || "No Title"}</h2>
        <p>${data.category || ""}</p>
      </div>
    `;

    container.appendChild(reel);
  });

});

</script>

</body>
</html>
