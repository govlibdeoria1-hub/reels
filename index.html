<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 🔥 MODERN LOGIN */
    #login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .login-box {
      width: 90%;
      max-width: 350px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .login-box h1 {
      font-size: 22px;
    }

    .login-box p {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
      font-weight: bold;
    }

    .guest {
      background: #111 !important;
      border: 1px solid #444;
    }

    .divider {
      margin: 10px 0;
      color: #888;
    }

    /* 🎥 REELS */
    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-size: 20px;
    }

    /* ☰ MENU */
    .hamburger {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 26px;
      color: white;
      z-index: 9999;
      cursor: pointer;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #121212;
      padding: 20px;
      transition: 0.3s;
      z-index: 9998;
    }

    .menu.open {
      left: 0;
    }

    .menu button {
      margin: 10px 0;
      background: #1e1e1e;
      color: white;
    }

  </style>
</head>

<body>

<!-- 🔥 LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="logo">⚡</div>
    <h1>Current Affairs</h1>
    <p>Swipe • Learn • Succeed</p>

    <input id="name" placeholder="Enter your name">
    <input id="mobile" placeholder="Mobile number">

    <button onclick="loginUser()">Continue</button>

    <div class="divider">OR</div>

    <button class="guest" onclick="guestLogin()">Browse as Guest</button>
  </div>
</div>

<!-- ☰ MENU -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
  <button onclick="loadHome()">🏠 Home</button>
  <button onclick="loadLiked()">❤️ Liked</button>
  <button onclick="loadSaved()">🔖 Saved</button>
</div>

<!-- 🎥 REELS -->
<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("userId");

// LOGIN
window.loginUser = async () => {
  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;

  if (!name || !mobile) return alert("Fill details");

  userId = mobile;

  await setDoc(doc(db,"users",userId), {
    name, mobile, liked: [], saved: []
  }, { merge:true });

  localStorage.setItem("userId", userId);
  document.getElementById("login").style.display = "none";

  loadApp();
};

// GUEST
window.guestLogin = () => {
  userId = "guest_" + Date.now();
  localStorage.setItem("userId", userId);
  document.getElementById("login").style.display = "none";
  loadApp();
};

// AUTO LOGIN
if(userId){
  document.getElementById("login").style.display = "none";
  loadApp();
}

const container = document.getElementById("container");

let allReels = [];
let userData = { liked:[], saved:[] };

function loadApp(){

  onSnapshot(doc(db,"users",userId), snap=>{
    userData = snap.data() || { liked:[], saved:[] };
    render(allReels);
  });

  onSnapshot(collection(db,"reels"), snap=>{
    allReels = [];
    snap.forEach(d=>{
      allReels.push({ id:d.id, ...d.data() });
    });
    render(allReels);
  });
}

// LIKE
window.toggleLike = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.liked.includes(id)){
    await updateDoc(ref,{ liked: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ liked: arrayUnion(id) });
  }
};

// SAVE
window.toggleSave = async(id)=>{
  const ref = doc(db,"users",userId);

  if(userData.saved.includes(id)){
    await updateDoc(ref,{ saved: arrayRemove(id) });
  } else {
    await updateDoc(ref,{ saved: arrayUnion(id) });
  }
};

// RENDER
function render(data){
  container.innerHTML = "";

  data.forEach(item=>{
    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${item.image}">
      <div class="overlay">${item.title || ""}</div>

      <div class="actions">
        <div onclick="toggleLike('${item.id}')">
          ${userData.liked.includes(item.id) ? "❤️" : "🤍"}
        </div>
        <div onclick="toggleSave('${item.id}')">
          ${userData.saved.includes(item.id) ? "🔖" : "📑"}
        </div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// MENU
window.toggleMenu = ()=>{
  document.getElementById("menu").classList.toggle("open");
};

window.loadHome = ()=>render(allReels);
window.loadLiked = ()=>render(allReels.filter(r=>userData.liked.includes(r.id)));
window.loadSaved = ()=>render(allReels.filter(r=>userData.saved.includes(r.id)));

</script>

</body>
</html>
