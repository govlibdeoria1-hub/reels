<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Affairs Reels</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: sans-serif;
    }

    .container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 15px;
      color: white;
    }
  </style>
</head>

<body>

<div id="app" class="container"></div>

<script type="module">

// ✅ Firebase Imports (Correct)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ आपका Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24",
  storageBucket: "reels-f0d24.appspot.com",
  messagingSenderId: "658150381663",
  appId: "1:658150381663:web:21f4e37a3163ea0f8f23ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const appDiv = document.getElementById("app");

// 🔥 Real-time data load
onSnapshot(collection(db, "reels"), (snapshot) => {

  appDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const item = doc.data();

    const reel = document.createElement("div");
    reel.className = "reel";

    reel.innerHTML = `
      <img src="${item.image}" />
      <div class="overlay">
        <h2>${item.title}</h2>
        <p>${item.category}</p>
      </div>
    `;

    appDiv.appendChild(reel);
  });

});

</script>

</body>
</html>
