<!DOCTYPE html>
<html>
<head>
  <title>Reels App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* LOGIN UI */
    #login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg,#020617,#0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .login-box {
      width: 90%;
      max-width: 350px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      text-align: center;
      color: white;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg,#7c3aed,#ec4899);
      color: white;
    }

    /* REELS */
    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* GRADIENT */
    .gradient {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }

    /* TEXT */
    .info {
      position: absolute;
      bottom: 70px;
      left: 15px;
      color: white;
      z-index: 2;
    }

    /* ACTIONS */
    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      color: white;
      font-size: 22px;
      z-index: 2;
    }

    /* MENU */
    .hamburger {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 26px;
      color: white;
      z-index: 9999;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #121212;
      padding: 20px;
      transition: 0.3s;
      z-index: 9998;
    }

    .menu.open {
      left: 0;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input id="name" placeholder="Name">
    <input id="mobile" placeholder="Mobile">
    <button onclick="loginUser()">Continue</button>
  </div>
</div>

<!-- MENU -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu text-white">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadLiked()">Liked</button>
  <button onclick="loadSaved()">Saved</button>
</div>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("userId");

// LOGIN
window.loginUser = async () => {
  userId = mobile.value;

  await setDoc(doc(db,"users",userId), {
    liked: [], saved: []
  }, { merge:true });

  localStorage.setItem("userId", userId);
  login.style.display="none";
  loadApp();
};

if(userId){
  login.style.display="none";
  loadApp();
}

const container = document.getElementById("container");

let allReels=[];
let userData={liked:[],saved:[]};

function loadApp(){

  onSnapshot(doc(db,"users",userId), snap=>{
    userData=snap.data()||{liked:[],saved:[]};
    render(allReels);
  });

  onSnapshot(collection(db,"reels"), snap=>{
    allReels=[];
    snap.forEach(d=>{
      allReels.push({id:d.id,...d.data()});
    });
    render(allReels);
  });
}

// LIKE
window.toggleLike=async(id)=>{
  const ref=doc(db,"users",userId);

  if(userData.liked.includes(id)){
    await updateDoc(ref,{liked:arrayRemove(id)});
  }else{
    await updateDoc(ref,{liked:arrayUnion(id)});
  }
};

// SAVE
window.toggleSave=async(id)=>{
  const ref=doc(db,"users",userId);

  if(userData.saved.includes(id)){
    await updateDoc(ref,{saved:arrayRemove(id)});
  }else{
    await updateDoc(ref,{saved:arrayUnion(id)});
  }
};

// RENDER (🔥 PREMIUM)
function render(data){
  container.innerHTML="";

  data.forEach(item=>{
    const reel=document.createElement("div");
    reel.className="reel";

    reel.innerHTML=`
      <img src="${item.image}">
      <div class="gradient"></div>

      <div class="info">
        <h3>${item.title||""}</h3>
        <p>${item.category||""}</p>
      </div>

      <div class="actions">
        <div onclick="toggleLike('${item.id}')">
          ${userData.liked.includes(item.id)?"❤️":"🤍"}
        </div>
        <div onclick="toggleSave('${item.id}')">
          ${userData.saved.includes(item.id)?"🔖":"📑"}
        </div>
        <div>💬</div>
        <div>🔗</div>
      </div>
    `;

    container.appendChild(reel);
  });
}

// MENU
window.toggleMenu=()=>menu.classList.toggle("open");

window.loadHome=()=>render(allReels);
window.loadLiked=()=>render(allReels.filter(r=>userData.liked.includes(r.id)));
window.loadSaved=()=>render(allReels.filter(r=>userData.saved.includes(r.id)));

</script>

</body>
</html>
