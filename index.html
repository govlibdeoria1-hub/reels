<!DOCTYPE html>
<html>
<head>
  <title>Reels Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: system-ui;
      overflow: hidden;
    }

    /* LOGIN */
    #login {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1e1b4b, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .login-box {
      width: 90%;
      max-width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      text-align: center;
      color: white;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: linear-gradient(90deg,#7c3aed,#ec4899);
      border: none;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    .login-box button:active {
      transform: scale(0.95);
    }

    /* REELS */
    #container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .reel {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    .reel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9);
    }

    /* GRADIENT */
    .gradient {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }

    /* TEXT */
    .info {
      position: absolute;
      bottom: 80px;
      left: 15px;
      color: white;
      max-width: 70%;
    }

    .info h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .info p {
      font-size: 13px;
      color: #ccc;
    }

    /* ACTION BUTTONS */
    .actions {
      position: absolute;
      right: 10px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      color: white;
      z-index: 2;
    }

    .action-btn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 12px;
      border-radius: 50%;
      font-size: 20px;
      transition: 0.2s;
    }

    .action-btn:active {
      transform: scale(0.85);
    }

    /* MENU */
    .hamburger {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 26px;
      color: white;
      z-index: 9999;
    }

    .menu {
      position: fixed;
      left: -260px;
      top: 0;
      width: 260px;
      height: 100%;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(20px);
      padding: 20px;
      transition: 0.3s;
      z-index: 9998;
    }

    .menu.open { left: 0; }

    .menu button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: white;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>⚡ Reels Pro</h2>
    <input id="mobile" placeholder="Enter mobile">
    <button onclick="loginUser()">Continue</button>
  </div>
</div>

<!-- MENU -->
<div class="hamburger" onclick="menu.classList.toggle('open')">☰</div>

<div id="menu" class="menu">
  <button onclick="loadHome()">Home</button>
  <button onclick="loadLiked()">Liked</button>
  <button onclick="loadSaved()">Saved</button>
</div>

<div id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "reels-f0d24.firebaseapp.com",
  projectId: "reels-f0d24"
});

const db = getFirestore(app);

let userId = localStorage.getItem("userId");

window.loginUser = async ()=>{
  userId = mobile.value;
  await setDoc(doc(db,"users",userId), {liked:[],saved:[]},{merge:true});
  localStorage.setItem("userId",userId);
  login.style.display="none";
  loadApp();
};

if(userId){ login.style.display="none"; loadApp(); }

let allReels=[], userData={liked:[],saved:[]};

function loadApp(){

  onSnapshot(doc(db,"users",userId), s=>{
    userData=s.data()||{liked:[],saved:[]};
    render(allReels);
  });

  onSnapshot(collection(db,"reels"), s=>{
    allReels=[];
    s.forEach(d=>allReels.push({id:d.id,...d.data()}));
    render(allReels);
  });
}

window.toggleLike=async(id)=>{
  const ref=doc(db,"users",userId);
  userData.liked.includes(id)
  ? await updateDoc(ref,{liked:arrayRemove(id)})
  : await updateDoc(ref,{liked:arrayUnion(id)});
};

window.toggleSave=async(id)=>{
  const ref=doc(db,"users",userId);
  userData.saved.includes(id)
  ? await updateDoc(ref,{saved:arrayRemove(id)})
  : await updateDoc(ref,{saved:arrayUnion(id)});
};

function render(data){
  container.innerHTML="";

  data.forEach(item=>{
    container.innerHTML+=`
      <div class="reel">
        <img src="${item.image}">
        <div class="gradient"></div>

        <div class="info">
          <h3>${item.title||""}</h3>
          <p>${item.category||""}</p>
        </div>

        <div class="actions">
          <div class="action-btn" onclick="toggleLike('${item.id}')">
            ${userData.liked.includes(item.id)?"❤️":"🤍"}
          </div>
          <div class="action-btn" onclick="toggleSave('${item.id}')">
            ${userData.saved.includes(item.id)?"🔖":"📑"}
          </div>
        </div>
      </div>
    `;
  });
}

window.loadHome=()=>render(allReels);
window.loadLiked=()=>render(allReels.filter(r=>userData.liked.includes(r.id)));
window.loadSaved=()=>render(allReels.filter(r=>userData.saved.includes(r.id)));

</script>

</body>
</html>
