<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Swipe | Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #6366f1; --secondary: #06b6d4; --glass-border: rgba(255, 255, 255, 0.15); }
    body { margin: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

    /* --- LOGIN --- */
    #login { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at top right, #1e1b4b, #000); display: flex; justify-content: center; align-items: center; }
    .login-card { width: 90%; max-width: 380px; padding: 45px 30px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 40px; text-align: center; }

    /* --- FEED (Critical for Swiping) --- */
    #container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
    #container::-webkit-scrollbar { display: none; }
    
    .reel { height: 100vh; width: 100%; position: relative; scroll-snap-align: start; scroll-snap-stop: always; overflow: hidden; }
    .reel img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 70%, rgba(0,0,0,0.9) 100%); pointer-events: none; }

    /* --- UI ELEMENTS --- */
    .nav-trigger, .noti-trigger { position: fixed; top: 25px; z-index: 999; width: 48px; height: 48px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; }
    .nav-trigger { left: 25px; }
    .noti-trigger { right: 25px; }
    .noti-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 10px #f43f5e; display: none; }

    .sidebar, .noti-pane { position: fixed; top: 0; height: 100%; background: rgba(8, 8, 8, 0.98); backdrop-filter: blur(50px); z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border); }
    .sidebar { left: -320px; width: 300px; padding: 80px 20px 20px; overflow-y: auto; }
    .sidebar.open { left: 0; }
    .noti-pane { right: -350px; width: 320px; padding: 100px 20px 20px; }
    .noti-pane.open { right: 0; }

    /* --- ACTIONS (Critical for Clicking) --- */
    .actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 22px; z-index: 50; }
    .action-circle { width: 55px; height: 55px; background: rgba(255,255,255,0.12); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); cursor: pointer; font-size: 24px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .action-circle:active { transform: scale(0.85); }
    .action-circle.liked { color: #f43f5e; border-color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
    .action-circle.saved { color: #f59e0b; border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }

    .nav-item { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 16px; color: #64748b; cursor: pointer; transition: 0.3s; margin-bottom: 4px; }
    .nav-item.active { background: rgba(255,255,255,0.08); color: white; border: 1px solid var(--glass-border); }
    .cat-item { padding: 10px 16px; border-radius: 12px; font-size: 13px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
    .cat-item.active { color: var(--secondary); background: rgba(6, 182, 212, 0.1); font-weight: bold; }
  </style>
</head>
<body>

  <div id="login">
    <div class="login-card">
      <h1 class="text-3xl font-black mb-2 italic italic">Current<span class="text-cyan-400">Swipe</span></h1>
      <input id="mobileInput" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white outline-none focus:border-cyan-400">
      <button id="loginBtn" class="w-full p-4 bg-gradient-to-r from-indigo-600 to-cyan-500 rounded-2xl font-bold uppercase tracking-widest">Enter</button>
    </div>
  </div>

  <div class="nav-trigger" id="menuToggle"><i class="fa-solid fa-bars-staggered"></i></div>
  <div class="noti-trigger" id="notiToggle"><i class="fa-solid fa-bell"></i><div class="noti-dot" id="notiDot"></div></div>

  <div id="sidebar" class="sidebar">
    <div class="nav-item active" id="navHome"><i class="fa-solid fa-house"></i> Feed</div>
    <div class="nav-item" id="navLiked"><i class="fa-solid fa-heart"></i> Liked</div>
    <div class="nav-item" id="navSaved"><i class="fa-solid fa-bookmark"></i> Saved</div>
    <div class="text-[10px] font-bold text-slate-500 tracking-widest mt-8 mb-4 px-4 uppercase">Categories</div>
    <div id="catList" class="space-y-1"></div>
    <div class="nav-item text-rose-500 mt-10" id="navLogout"><i class="fa-solid fa-power-off"></i> Logout</div>
  </div>

  <div id="notiPane" class="noti-pane">
    <h2 class="text-xl font-bold mb-6">Notifications</h2>
    <div id="notiList" class="space-y-4"></div>
  </div>

  <div id="container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDD9hS0jRiKDUP6-tv6J1xghs-bwi5Cods", 
        authDomain: "reels-f0d24.firebaseapp.com", 
        projectId: "reels-f0d24" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = localStorage.getItem("userId");
    let allReels = [], userData = { liked: [], saved: [] };
    let currentView = 'home'; 
    let activeCategory = null;

    const container = document.getElementById('container');

    const render = (data) => {
      container.innerHTML = '';
      if(!data.length) {
        container.innerHTML = `<div class="h-screen flex items-center justify-center text-slate-500">No Content</div>`;
        return;
      }
      
      data.forEach(item => {
        const isLiked = userData.liked?.includes(item.id);
        const isSaved = userData.saved?.includes(item.id);
        
        const reelDiv = document.createElement('div');
        reelDiv.className = 'reel';
        reelDiv.innerHTML = `
          <img src="${item.image}">
          <div class="vignette"></div>
          <div class="absolute bottom-12 left-6 right-20 pointer-events-none">
            <span class="bg-cyan-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase mb-2 inline-block">${item.category || 'General'}</span>
            <p class="text-white font-bold text-lg leading-tight shadow-black drop-shadow-lg">${item.title}</p>
          </div>
          <div class="actions">
            <div class="action-circle btn-like ${isLiked ? 'liked' : ''}" data-id="${item.id}">
              <i class="fa-solid fa-heart"></i>
            </div>
            <div class="action-circle btn-save ${isSaved ? 'saved' : ''}" data-id="${item.id}">
              <i class="fa-solid fa-bookmark"></i>
            </div>
          </div>
        `;
        
        // Manual Event Listeners for reliability
        reelDiv.querySelector('.btn-like').onclick = () => window.handleAction(item.id, 'liked');
        reelDiv.querySelector('.btn-save').onclick = () => window.handleAction(item.id, 'saved');
        
        container.appendChild(reelDiv);
      });
    };

    window.handleAction = async (id, field) => {
      const isPresent = userData[field]?.includes(id);
      await updateDoc(doc(db, "users", userId), { 
        [field]: isPresent ? arrayRemove(id) : arrayUnion(id) 
      });
    };

    const refreshView = () => {
      let filtered = [...allReels];
      if (currentView === 'liked') filtered = allReels.filter(r => userData.liked?.includes(r.id));
      else if (currentView === 'saved') filtered = allReels.filter(r => userData.saved?.includes(r.id));
      else if (activeCategory) filtered = allReels.filter(r => r.category === activeCategory);
      render(filtered);
    };

    const loadApp = () => {
      onSnapshot(doc(db, "users", userId), s => { 
        userData = s.data() || {liked:[], saved:[]}; 
        refreshView(); 
      });
      
      onSnapshot(collection(db, "reels"), s => {
        allReels = s.docs.map(d => ({ id: d.id, ...d.data() }));
        const cats = [...new Set(allReels.map(r => r.category).filter(Boolean))];
        catList.innerHTML = cats.map(c => `
          <div class="cat-item ${activeCategory === c ? 'active' : ''}" onclick="window.filterCat('${c}')">${c}</div>
        `).join('');
        refreshView();
      });

      onSnapshot(query(collection(db, "notifications"), orderBy("time", "desc"), limit(5)), s => {
        notiDot.style.display = s.empty ? "none" : "block";
        notiList.innerHTML = s.docs.map(d => `<div class="bg-white/5 p-4 rounded-xl border border-white/10"><p class="text-sm font-bold text-cyan-400">${d.data().title}</p><p class="text-xs opacity-60">${d.data().msg}</p></div>`).join('');
      });
    };

    window.filterCat = (cat) => {
      activeCategory = cat; currentView = 'category';
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      sidebar.classList.remove('open');
      refreshView();
    };

    navHome.onclick = () => { 
      activeCategory = null; currentView = 'home'; 
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      navHome.classList.add('active');
      refreshView(); sidebar.classList.remove('open'); 
    };
    
    navLiked.onclick = () => { currentView = 'liked'; activeCategory = null; refreshView(); sidebar.classList.remove('open'); };
    navSaved.onclick = () => { currentView = 'saved'; activeCategory = null; refreshView(); sidebar.classList.remove('open'); };

    loginBtn.onclick = async () => {
      if(!mobileInput.value) return;
      userId = mobileInput.value;
      await setDoc(doc(db, "users", userId), {liked:[], saved:[], registeredAt: Date.now()}, {merge:true});
      localStorage.setItem("userId", userId);
      login.style.display = "none";
      loadApp();
    };

    menuToggle.onclick = () => sidebar.classList.toggle("open");
    notiToggle.onclick = () => { notiPane.classList.toggle("open"); notiDot.style.display = "none"; };
    navLogout.onclick = () => { localStorage.clear(); location.reload(); };
    if(userId) { login.style.display = "none"; loadApp(); }
  </script>
</body>
</html>
